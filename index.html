<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Check-in Premium</title>
    
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0088cc;
            --primary-hover: #00aaff;
            --glass-bg: rgba(20, 25, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            /* Animated Mesh Gradient Background */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #001f3f, #006b99);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--glass-shadow), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        /* Ambient Glow Behind Container */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 170, 255, 0.15) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 700;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .section-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .section-card:hover {
            background: rgba(0, 0, 0, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-color: rgba(255,255,255,0.15);
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        textarea {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 14px;
            outline: none;
            resize: vertical;
            min-height: 120px;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--primary-hover);
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3), inset 0 2px 5px rgba(0,0,0,0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }

        /* Button Shine Effect */
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s ease;
        }
        button:hover::after { left: 150%; }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0, 170, 255, 0.5);
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.7; transform: none; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
        }
        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.2); 
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0088cc, #00aaff);
            font-size: 18px;
            padding: 16px;
            margin-top: 10px;
        }

        #cameraFeed, #photoPreview {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-show { display: block !important; }
        .success { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .error { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
        
        .tg-icon { width: 34px; height: 34px; fill: #00aaff; filter: drop-shadow(0 2px 8px rgba(0,170,255,0.4)); }
        .tg-icon-circle { fill: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <svg class="tg-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" class="tg-icon-circle"/>
            <path d="M17.48 7.37c-.15-1.58-.8-5.42-1.13-7.19-.14-.75-.42-1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.11.03-1.84 1.18-5.2 3.45-.49.34-.94.5-1.35.49-.45-.01-1.32-.26-1.96-.47-.79-.26-1.42-.4-1.37-.85.03-.23.35-.47.96-.73 3.77-1.64 6.29-2.73 7.55-3.25 3.59-1.49 4.34-1.75 4.83-1.76.11 0 .35.03.48.14.11.09.14.22.15.33-.01.07-.01.19-.03.3z" transform="translate(1.5, 3.5) scale(0.85)"/>
        </svg>
        Telegram Check-in
    </h2>
    
    <!-- Bagian 1: Lokasi & Data -->
    <div class="section-card">
        <label>📍 Data Perangkat & Lokasi</label>
        <button type="button" class="btn-secondary" onclick="getMetadata()">
            <svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Tarik Lokasi & IP Address
        </button>
        <textarea id="messageText" placeholder="Data lokasi, IP, dan Perangkat akan muncul di sini..."></textarea>
    </div>

    <!-- Bagian 2: Kamera -->
    <div class="section-card">
        <label>📷 Ambil Foto Selfie</label>
        <button type="button" class="btn-secondary" id="startCamBtn" onclick="openCamera()">
            <svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h3l2-2h6l2 2h3c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm8 3c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/></svg>
            Buka Kamera
        </button>
        <video id="cameraFeed" autoplay playsinline></video>
        <button type="button" id="captureBtn" class="btn-secondary" style="display:none; margin-top:10px; background: rgba(0, 136, 204, 0.2);" onclick="capturePhoto()">
            📸 Jepret Foto Sekarang
        </button>
        <img id="photoPreview" alt="Hasil Foto">
    </div>

    <!-- Tombol Kirim Utama -->
    <button id="sendBtn" class="btn-primary" onclick="sendToTelegram()">
        <span>Kirim Laporan</span>
        <svg style="width:20px;height:20px" viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>

    <div id="status"></div>
</div>

<script>
    const BOT_TOKEN = "8771972979:AAG9Z5INVkhgA8U9MqoZE4wkmh9iltvSnuk";
    const urlParams = new URLSearchParams(window.location.search);
    const CHAT_ID = urlParams.get('chat_id') || "1350680591";

    let cameraStream = null;
    let imageBlob = null;

    async function getMetadata() {
        const textArea = document.getElementById("messageText");
        textArea.value = "⏳ Sedang mengambil data...";
        
        let ipInfo = "IP tidak ditemukan";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ipInfo = data.ip;
        } catch (e) { console.error("Gagal ambil IP", e); }

        const userAgent = navigator.userAgent;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    textArea.value = `📍 Lokasi:\nhttps://maps.google.com/?q=${lat},${lon}\n\n🌐 IP Address:\n${ipInfo}\n\n📱 Perangkat (Meta):\n${userAgent}`;
                },
                (err) => {
                    textArea.value = `📍 Lokasi: Gagal diakses (${err.message})\n\n🌐 IP Address:\n${ipInfo}\n\n📱 Perangkat (Meta):\n${userAgent}`;
                    alert("Akses lokasi ditolak atau gagal didapatkan.");
                }
            );
        } else {
            textArea.value = `📍 Lokasi: Browser tidak mendukung\n\n🌐 IP Address:\n${ipInfo}\n\n📱 Perangkat (Meta):\n${userAgent}`;
        }
    }

    async function openCamera() {
        const video = document.getElementById('cameraFeed');
        const startCamBtn = document.getElementById('startCamBtn');
        const captureBtn = document.getElementById('captureBtn');
        const photoPreview = document.getElementById('photoPreview');
        
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = cameraStream;
            video.style.display = 'block';
            photoPreview.style.display = 'none';
            captureBtn.style.display = 'flex';
            startCamBtn.style.display = 'none';
        } catch (err) {
            alert("Gagal mengakses kamera. Pastikan browser memiliki izin kamera.");
            console.error(err);
        }
    }

    function capturePhoto() {
        const video = document.getElementById('cameraFeed');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob((blob) => {
            imageBlob = blob;
            
            const img = document.getElementById('photoPreview');
            img.src = URL.createObjectURL(blob);
            img.style.display = 'block';
            
            cameraStream.getTracks().forEach(track => track.stop());
            video.style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            
            const startCamBtn = document.getElementById('startCamBtn');
            startCamBtn.innerHTML = `<svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Ulangi Foto`;
            startCamBtn.style.display = 'flex';
        }, 'image/jpeg', 0.85);
    }

    async function sendToTelegram() {
        const text = document.getElementById("messageText").value.trim();
        const btn = document.getElementById("sendBtn");
        const statusEl = document.getElementById("status");

        statusEl.classList.remove("status-show", "success", "error");

        if (!text && !imageBlob) {
            showStatus("⚠️ Harap ambil lokasi atau foto terlebih dahulu.", "error");
            return;
        }

        btn.disabled = true;
        btn.querySelector("span").innerText = "Mengirim...";

        try {
            let response;

            if (imageBlob) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                const formData = new FormData();
                formData.append("chat_id", CHAT_ID);
                formData.append("photo", imageBlob, "photo.jpg");
                if (text) formData.append("caption", text);

                response = await fetch(url, { method: "POST", body: formData });
            } else {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text })
                });
            }

            const data = await response.json();
            if (data.ok) {
                showStatus("✅ Laporan berhasil dikirim ke Telegram!", "success");
            } else {
                showStatus(`❌ Gagal: ${data.description}`, "error");
            }
        } catch (error) {
            showStatus(`🔌 Terjadi kesalahan koneksi jaringan!`, "error");
        } finally {
            btn.disabled = false;
            btn.querySelector("span").innerText = "Kirim Laporan";
        }
    }

    function showStatus(msg, type) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = msg;
        statusEl.className = type + " status-show";
    }
</script>

</body>
</html>
